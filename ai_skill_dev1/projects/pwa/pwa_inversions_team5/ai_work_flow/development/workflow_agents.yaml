# Workflow de Agentes - Proyecto pwa_inversions_team5

# YAML Configuration para tasks de agentes en el proyecto de inversiones

# ============================================
# INFORMACIÓN DEL WORKFLOW
# ============================================
project:
  code: "pwa_inversions_team5"
  name: "Plataforma de Inversiones IA"
  phase: "FASE 2.2"
  last_updated: "2026-03-17"

# ============================================
# TAREAS GLOBALES DEL PROYECTO (Todos los agentes)
# ============================================
project_tasks:
  - id: "TASK-GLOBAL-001"
    name: "Setup inicial del proyecto"
    description: "Crear estructura de carpetas, archivos base, configuración"
    phase: "FASE 2.1-2.2"
    responsible: "MEMO + BANDA"
    status: "completed"

  - id: "TASK-GLOBAL-002"
    name: "Completar SPECIFICATION.md"
    description: "Especificación técnica completa del proyecto de inversiones"
    phase: "FASE 2.2"
    responsible: "Usuario (responsable del proyecto) + MEMO (revisión)"
    status: "pending"
    depends_on: []
    deadline: "Antes de FASE 2.3"

  - id: "TASK-GLOBAL-003"
    name: "Investigación de dominio"
    description: "MEMO investigación: brokers, APIs, indicadores, estrategias"
    phase: "FASE 2.3"
    responsible: "MEMO"
    status: "pending"
    depends_on: ["TASK-GLOBAL-002"]
    skills: ["knowledge_synthesizer", "architecture_designer"]

  - id: "TASK-GLOBAL-004"
    name: "Validación de modelos de datos"
    description: "BANDA valida/propone esquemas para Supabase + MongoDB"
    phase: "FASE 2.3"
    responsible: "BANDA"
    status: "pending"
    depends_on: ["TASK-GLOBAL-002"]
    skills: ["database_schema_designer"]

  - id: "TASK-GLOBAL-005"
    name: "Generación de tickets internos"
    description: "MEMO crea 8-12 tickets TKT-INVT5-### basados en investigación"
    phase: "FASE 2.4"
    responsible: "MEMO"
    status: "pending"
    depends_on: ["TASK-GLOBAL-003"]
    output: "Tickets en tickets/README.md"

  - id: "TASK-GLOBAL-006"
    name: "Configuración de .env.example"
    description: "BANDA genera .env.example por motor (Supabase + MongoDB)"
    phase: "FASE 2.4"
    responsible: "BANDA"
    status: "pending"
    depends_on: ["TASK-GLOBAL-002"]
    output: "rest_api/​.env.example"

  - id: "TASK-GLOBAL-007"
    name: "Solicitar credenciales reales"
    description: "BANDA solicita .env completo con credenciales reales"
    phase: "FASE 2.4"
    responsible: "Usuario (compartir creds) + BANDA (validar)"
    status: "pending"
    depends_on: ["TASK-GLOBAL-006"]
    blocker: "true"

