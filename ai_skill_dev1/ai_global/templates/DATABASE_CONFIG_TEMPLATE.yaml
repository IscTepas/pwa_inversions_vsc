# Database Configuration Template

```yaml
# ============================================
# INTEGRACION DE PROYECTOS
# ============================================
project_integration:
  frontend_project_path: "ai_skill_dev1/projects/pwa/pwa_inversions_team5"
  rest_api_project_path: "ai_skill_dev1/projects/api/rest_api_inversions_team5"

# ============================================
# SELECCION DE BASES DE DATOS
# ============================================
database_selection:
  selected_engines:
    - alias: "<engine_alias_1>"
      engine: "<engine_name_1>"
      enabled: true

# ============================================
# CUENTAS Y ENTORNOS POR MOTOR
# ============================================
accounts:
  <engine_alias_1>:
    provider: "<provider_1>"
    owner_email: "<email-del-owner>"
    project_name: "<project_name_1>"
    project_ref: "<project_ref_or_cluster_1>"
    region: "<region_1>"
    environment: "development"

# ============================================
# ESTRATEGIA DE MODELOS DE DATOS
# ============================================
model_strategy:
  per_database:
    <engine_alias_1>:
      source_mode: "provided_by_user"  # provided_by_user | generate_by_ai
      state: "draft"  # draft | candidate | approved

# ============================================
# VARIABLES DE ENTORNO REQUERIDAS
# ============================================
env_variables:
  supabase:
    - SUPABASE_URL
    - SUPABASE_ANON_KEY
    - SUPABASE_SERVICE_ROLE_KEY

  mongodb:
    - MONGODB_URI
    - MONGODB_DB_NAME
```

