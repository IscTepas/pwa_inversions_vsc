# Project Configuration

```yaml
# ============================================
# INFORMACIÓN DEL PROYECTO
# ============================================
project:
  code: "<project_code>"
  name: "<Project Name>"
  version: "1.0.0"
  category: "rpa"  # rpa | automation | integration | reporting | other
  description: "Descripción corta del propósito del proyecto"
  status: "development"  # development | testing | production
  metadata:
    owner: "<Nombre del owner>"
    team: "<Nombre del equipo>"
    created: "YYYY-MM-DD"
    last_updated: "YYYY-MM-DD"
    repository: "<URL del repo si aplica>"

# ============================================
# DEPENDENCIAS
# ============================================
dependencies:
  global_skills:
    - name: "sap_connection"
      version: ">=2.0.0"
      required: true
  global_agents:
    - name: "data_validator_agent"
      version: ">=1.0.0"
      required: false
  python_packages:
    - "pandas>=1.5.0"
    - "openpyxl>=3.0.0"
    - "python-dotenv>=0.19.0"
  system_requirements:
    - "Python>=3.8"
    - "Windows 10+ o Linux"

# ============================================
# CONFIGURACIÓN DE ENTORNOS
# ============================================
environments:
  development:
    enabled: true
    log_level: "DEBUG"
    debug_mode: true
  testing:
    enabled: true
    log_level: "INFO"
    debug_mode: false
  production:
    enabled: true
    log_level: "WARNING"
    debug_mode: false

# ============================================
# CONFIGURACIÓN DE EJECUCIÓN
# ============================================
execution:
  timeout: 300
  max_retries: 3
  retry_delay: 5
  parallel_execution:
    enabled: false
    max_workers: 4
```
